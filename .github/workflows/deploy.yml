name: Deploy static site to Oderland

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-oderland
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      SFTP_HOST: premium24.oderland.com
      SFTP_USER: bryngels
      SFTP_PORT: 22
      # cPanel SFTP starts in /home/bryngels, so this maps to
      # /home/bryngels/el-fix.se on the server.
      REMOTE_PATH: el-fix.se

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify static export
        run: |
          test -f out/index.html
          test -d out/_next/static

      - name: Install SFTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Configure SSH key
        env:
          SFTP_PRIVATE_KEY: ${{ secrets.SFTP_PRIVATE_KEY }}
        run: |
          test -n "$SFTP_PRIVATE_KEY"
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$SFTP_PRIVATE_KEY" > "$HOME/.ssh/el-fix-github-actions"
          chmod 600 "$HOME/.ssh/el-fix-github-actions"

      - name: Upload out contents to Oderland
        run: |
          lftp \
            -u "$SFTP_USER","" \
            -p "$SFTP_PORT" \
            "sftp://$SFTP_HOST" <<EOF
          set net:max-retries 3
          set net:timeout 20
          set sftp:auto-confirm yes
          set sftp:connect-program "ssh -a -x -i $HOME/.ssh/el-fix-github-actions -o StrictHostKeyChecking=accept-new"
          mkdir -p "$REMOTE_PATH"
          cd "$REMOTE_PATH"
          mirror --reverse --delete --delete-first --verbose \
            --no-perms \
            --exclude-glob ".well-known" \
            --exclude-glob ".well-known/**" \
            --exclude-glob "cgi-bin" \
            --exclude-glob "cgi-bin/**" \
            "out/" "."
          cls -l "../$REMOTE_PATH/index.html"
          cls -d "../$REMOTE_PATH/_next/static"
          bye
          EOF
